<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <title>Logowanie</title>
</head>
<body>
    <h1>Logowanie</h1>

    {% if form.errors %}
        <p>Nieprawidłowy login lub hasło.</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Zaloguj się</button>
    </form>

    <p><a href="/courses/">Powrót do kursów</a></p>
</body>
</html>
