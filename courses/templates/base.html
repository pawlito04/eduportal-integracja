<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EduPortal</title>
    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f4f6f9;
            color: #222;
        }

        .navbar {
            background: #1f2937;
            color: white;
            padding: 16px 24px;
        }

        .navbar-inner {
            max-width: 1100px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 16px;
            flex-wrap: wrap;
        }

        .brand a {
            color: white;
            text-decoration: none;
            font-size: 22px;
            font-weight: bold;
        }

        .nav-links {
            display: flex;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }

        .nav-links a {
            color: white;
            text-decoration: none;
            padding: 8px 12px;
            border-radius: 8px;
        }

        .nav-links a:hover {
            background: rgba(255,255,255,0.12);
        }

        .logout-form {
            display: inline;
            margin: 0;
        }

        .logout-btn {
            background: #dc2626;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 8px;
            cursor: pointer;
        }

        .logout-btn:hover {
            background: #b91c1c;
        }

        .container {
            max-width: 1100px;
            margin: 32px auto;
            padding: 0 16px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 4px 14px rgba(0,0,0,0.08);
        }

        .btn {
            display: inline-block;
            background: #2563eb;
            color: white;
            text-decoration: none;
            border: none;
            padding: 10px 16px;
            border-radius: 8px;
            cursor: pointer;
        }

        .btn:hover {
            background: #1d4ed8;
        }

        .btn-success {
            background: #16a34a;
        }

        .btn-success:hover {
            background: #15803d;
        }

        .btn-secondary {
            background: #6b7280;
        }

        .btn-secondary:hover {
            background: #4b5563;
        }

        .btn-gold {
            background: #ca8a04;
        }

        .btn-gold:hover {
            background: #a16207;
        }

        .progress-wrapper {
            background: #e5e7eb;
            border-radius: 999px;
            height: 14px;
            overflow: hidden;
            margin-top: 10px;
            margin-bottom: 8px;
        }

        .progress-bar {
            background: #22c55e;
            height: 100%;
        }

        .badge {
            display: inline-block;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: bold;
        }

        .badge-success {
            background: #dcfce7;
            color: #166534;
        }

        .badge-warning {
            background: #fef3c7;
            color: #92400e;
        }

        .badge-info {
            background: #dbeafe;
            color: #1e40af;
        }

        .badge-gold {
            background: #fef3c7;
            color: #854d0e;
        }

        .muted {
            color: #6b7280;
        }

        .lesson-list,
        .course-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .lesson-item,
        .course-item {
            border: 1px solid #e5e7eb;
            border-radius: 10px;
            padding: 16px;
            margin-bottom: 12px;
            background: #fafafa;
        }

        .top-space {
            margin-top: 16px;
        }

        h1, h2, h3, h4 {
            margin-top: 0;
        }

        .actions {
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            margin-top: 14px;
        }

        @media (max-width: 768px) {
            .navbar-inner {
                flex-direction: column;
                align-items: flex-start;
            }
        }
    </style>
</head>
<body>
    <header class="navbar">
        <div class="navbar-inner">
            <div class="brand">
                <a href="{% url 'courses:course_list' %}">EduPortal</a>
            </div>

            <nav class="nav-links">
                <a href="{% url 'courses:course_list' %}">Wszystkie kursy</a>

                {% if user.is_authenticated %}
                    <a href="{% url 'courses:my_courses' %}">Mój progres</a>
                    <span>Zalogowany: {{ user.username }}</span>

                    <form method="post" action="{% url 'logout' %}" class="logout-form">
                        {% csrf_token %}
                        <button type="submit" class="logout-btn">Wyloguj</button>
                    </form>
                {% else %}
                    <a href="{% url 'login' %}">Zaloguj</a>
                {% endif %}
            </nav>
        </div>
    </header>

    <main class="container">
        {% block content %}
        {% endblock %}
    </main>
</body>
</html>
